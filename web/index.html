<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- ==================== SEO (completo) ==================== -->
  <title>Denis Germán Giménez | Python Backend & Automation Engineer</title>
  <meta name="description" content="Personal portfolio of Denis Germán Giménez, Python Backend Engineer focused on automation platforms, microservices, API design, DCC pipeline tools, Flutter apps, and IoT projects.">
  <meta name="keywords" content="Denis Gimenez, Denis Germán Giménez, Python Backend Engineer, Backend Developer, Automation Engineer, Flutter Developer, DCC Pipeline Tools, Microservices, API Design, Argentina Developer">
  <meta name="author" content="Denis Germán Giménez">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#000000">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <link rel="canonical" href="https://www.denisgimenez.com/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.denisgimenez.com/">
  <meta property="og:title" content="Denis Germán Giménez | Python Backend & Automation Engineer">
  <meta property="og:description" content="Python Backend Engineer focused on automation platforms, microservices, API design, DCC pipeline tools, Flutter apps, and IoT projects.">
  <meta property="og:image" content="https://www.denisgimenez.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wave {
      width: 6px;
      height: 100px;
      background: linear-gradient(45deg, #00ff9d, #00cc77);
      margin: 8px;
      animation: wave 1.2s linear infinite;
      border-radius: 20px;
    }
    .wave:nth-child(2) { animation-delay: 0.1s; }
    .wave:nth-child(3) { animation-delay: 0.2s; }
    .wave:nth-child(4) { animation-delay: 0.3s; }
    .wave:nth-child(5) { animation-delay: 0.4s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="center">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>

  <!-- Flutter Bootstrap (IMPORTANTE) -->
  <script src="flutter.js" defer></script>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    window.addEventListener('load', function(ev) {
      _flutter.loader.load({
        serviceWorker: null,
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
