  <!-- ==================== URL → Page routing ==================== -->
  <!--
    Flutter Web (CanvasKit / HTML renderer) does NOT handle the browser's
    History API automatically when the user types a URL directly.
    This script reads the path on first load, stores the intended deep-link
    in sessionStorage, and after Flutter boots it reads that value so
    PageStateController.jumpToPage() can restore the right page.

    Supported paths:
      /              → page 0  (Welcome)
      /about         → page 1  (About Me)
      /knowledge     → page 2  (Knowledge)
      /experience    → page 3  (Experience)
      /projects      → page 4  (Projects)
      /contact       → page 5  (Contact)
  -->
  <script>
    (function () {
      var pathMap = {
        '/':          0,
        '/about':     1,
        '/knowledge': 2,
        '/experience':3,
        '/projects':  4,
        '/contact':   5,
      };

      var path = window.location.pathname.replace(/\/$/, '') || '/';
      var page = pathMap[path];

      if (page !== undefined && page !== 0) {
        // Store deep-link target so Flutter can read it after boot
        sessionStorage.setItem('initialPage', String(page));
      }

      // Expose a helper Flutter JS can call via js.context['setFlutterPage']
      window.getInitialPage = function () {
        var p = sessionStorage.getItem('initialPage');
        sessionStorage.removeItem('initialPage');
        return p !== null ? parseInt(p, 10) : 0;
      };
    })();
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wave {
      width: 6px;
      height: 100px;
      background: linear-gradient(45deg, #00ff9d, #00cc77);
      margin: 8px;
      animation: wave 1.2s linear infinite;
      border-radius: 20px;
    }
    .wave:nth-child(2) { animation-delay: 0.1s; }
    .wave:nth-child(3) { animation-delay: 0.2s; }
    .wave:nth-child(4) { animation-delay: 0.3s; }
    .wave:nth-child(5) { animation-delay: 0.4s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); }
      50%       { transform: scaleY(1); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="center">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>

  <!-- Flutter Bootstrap -->
  <script src="flutter.js" defer></script>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    window.addEventListener('load', function () {
      _flutter.loader.load({
        serviceWorker: null,
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
